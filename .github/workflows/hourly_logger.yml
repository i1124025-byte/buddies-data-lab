name: Hourly YouTube Stat Logger

on:
  schedule:
    # 毎時0分に実行（日本時間では毎時0分になります）
    - cron: "*/5 * * * *"
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  build:
    runs-on: ubuntu-latest
    # サーバーがファイルに書き込む権限を持つために必要
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install google-api-python-client pandas

      - name: Run script (debug)
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: |
          set -euxo pipefail
          python -V
          pwd
          ls -la
          echo "YT_API_KEY length: ${#YT_API_KEY}"
          python main.py
          echo "=== after main.py ==="
          find . -maxdepth 4 -type f \( -name "*.csv" -o -name "last_run_stats.json" \) -print
          echo "=== logs listing ==="
          ls -la logs || true
          echo "=== last_run_stats.json ==="
          ls -la last_run_stats.json || true
          
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --porcelain
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update logs and cache: $(date -u)"
            git push
          fi
